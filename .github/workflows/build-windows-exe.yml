name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（如 1.0.0）'
        required: false
        default: 'dev'

jobs:
  build-exe:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install waitress pywebview pyinstaller

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
          elif [[ "${{ github.event.inputs.version }}" != "" && "${{ github.event.inputs.version }}" != "dev" ]]; then
            VERSION="v${{ github.event.inputs.version }}"
          else
            VERSION="dev-$(echo ${{ github.sha }} | cut -c1-7)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Build single exe (--onefile)
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean `
            --name OutlookEmail `
            --onefile `
            --console `
            --add-data "templates;templates" `
            --add-data "web_outlook_app.py;." `
            --hidden-import waitress `
            --hidden-import waitress.server `
            --hidden-import waitress.task `
            --hidden-import waitress.channel `
            --hidden-import waitress.receiver `
            --hidden-import waitress.buffers `
            --hidden-import waitress.parser `
            --hidden-import waitress.utilities `
            --hidden-import webview `
            --hidden-import flask `
            --hidden-import flask.json `
            --hidden-import flask_wtf `
            --hidden-import flask_wtf.csrf `
            --hidden-import werkzeug `
            --hidden-import werkzeug.middleware.proxy_fix `
            --hidden-import jinja2 `
            --hidden-import markupsafe `
            --hidden-import requests `
            --hidden-import requests.adapters `
            --hidden-import urllib3 `
            --hidden-import socks `
            --hidden-import sockshandler `
            --hidden-import bcrypt `
            --hidden-import cryptography `
            --hidden-import cryptography.fernet `
            --hidden-import cryptography.hazmat.primitives `
            --hidden-import cryptography.hazmat.primitives.hashes `
            --hidden-import cryptography.hazmat.primitives.kdf.pbkdf2 `
            --hidden-import cryptography.hazmat.backends `
            --hidden-import apscheduler `
            --hidden-import apscheduler.schedulers.background `
            --hidden-import apscheduler.triggers.interval `
            --hidden-import apscheduler.triggers.cron `
            --hidden-import croniter `
            --hidden-import sqlite3 `
            --hidden-import email `
            --hidden-import imaplib `
            --exclude-module tkinter `
            --exclude-module _tkinter `
            --exclude-module matplotlib `
            --exclude-module numpy `
            --exclude-module pandas `
            --exclude-module scipy `
            --exclude-module PIL `
            --exclude-module cv2 `
            --exclude-module unittest `
            --exclude-module pydoc `
            --exclude-module xmlrpc `
            run_windows.py

      - name: Rename exe with version
        shell: pwsh
        run: |
          Move-Item "dist\OutlookEmail.exe" "dist\OutlookEmail-${{ steps.version.outputs.version }}.exe"

      - name: Verify build artifact
        shell: pwsh
        run: |
          $file = Get-Item "dist\OutlookEmail-${{ steps.version.outputs.version }}.exe"
          Write-Host "File: $($file.Name)"
          Write-Host "Size: $([math]::Round($file.Length / 1MB, 1)) MB"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OutlookEmail-${{ steps.version.outputs.version }}
          path: dist/OutlookEmail-*.exe
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: OutlookEmail ${{ steps.version.outputs.version }}
          body: |
            ## Outlook 邮件 Web 应用 ${{ steps.version.outputs.version }}

            ### 使用方法
            1. 下载 `OutlookEmail-${{ steps.version.outputs.version }}.exe`
            2. 双击运行，自动弹出桌面窗口
            3. 默认密码: `admin123`（请在设置中修改）
            4. 关闭窗口即可退出程序

            ### 数据存储
            - 数据库保存在 exe 同目录下的 `data/` 文件夹，自动创建
            - SECRET_KEY 自动生成并持久化到 `data/.secret_key`
            - 升级时只需替换 exe 文件，`data/` 文件夹保持不变

            ### 系统要求
            - Windows 10 / 11（需要 WebView2 运行时，Win10 2004+ 和 Win11 已内置）
            - 如果 WebView2 不可用，会自动回退到浏览器模式
          files: dist/OutlookEmail-*.exe
          draft: false
          prerelease: false
